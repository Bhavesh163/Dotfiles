# Basic Hyprland configuration that should work
monitor=,preferred,auto,1

# Startup
exec-once = waybar &
exec-once = mako &

# Programs
$terminal = kitty
$menu = wofi --show drun

# Input
input {
    kb_layout = us
    follow_mouse = 1
}

# General
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgb(ff00ff)
    col.inactive_border = rgb(444444)
    layout = dwindle
}

# Keybindings
$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod, D, exec, $menu
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
